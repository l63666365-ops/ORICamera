<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
            justify-content: center;
        }

        /* Container Kamera Rasio 3:4 */
        #camera-wrapper {
            width: 100%;
            max-width: 500px; /* Batas lebar biar gak terlalu melar di tablet */
            aspect-ratio: 3 / 4;
            position: relative;
            background: #111;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(1); /* Tetap asli non-mirror */
        }

        .controls {
            width: 100%;
            height: 120px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #snap {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.5);
            transition: transform 0.1s;
        }

        #snap:active { transform: scale(0.9); }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap"></button>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "user",
                    aspectRatio: 0.75 // Ini paksaan rasio 3:4 dari sistem
                },
                audio: false
            });
            video.srcObject = stream;
        } catch (e) {
            console.error("error: ", e);
        }
    }

    snap.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        // Set ukuran canvas sesuai rasio 3:4
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataURL;
        link.download = 'ORICamera_' + Date.now() + '.png';
        link.click();
    });

    init();
</script>

</body>
</html>
