<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
        }

        /* Container 3:4 Sebenarnya */
        #camera-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4;
            max-height: 75vh;
            position: relative;
            background: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            /* Menggunakan fill agar sensor asli dipaksa masuk ke kotak 3:4 */
            object-fit: fill; 
        }

        .controls {
            flex: 1;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #snap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #fff;
            background: #ff4444;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
            /* Memastikan area sentuh aktif */
            pointer-events: auto; 
            -webkit-tap-highlight-color: transparent;
        }

        #snap:active { transform: scale(0.9); background: #cc0000; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap" type="button"></button>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');

    async function init() {
        // Meminta resolusi sensor 3:4 yang luas
        const constraints = {
            video: {
                facingMode: "user",
                width: { ideal: 1440 }, 
                height: { ideal: 1920 },
                aspectRatio: 0.75
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (e) {
            alert("izin kamera bermasalah: " + e);
        }
    }

    // Perbaikan fungsi tombol jepret
    snap.onclick = function(e) {
        e.preventDefault();
        const context = canvas.getContext('2d');
        
        // Ambil resolusi asli dari aliran video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imgData = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = imgData;
        link.download = `ORICamera_${Date.now()}.png`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // Pastikan inisialisasi jalan setelah halaman siap
    window.onload = init;
</script>
</body>
</html>
