<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
        }

        /* Container 3:4 yang Fix dan Luas */
        #camera-wrapper {
            width: 100vw;
            height: calc(100vw * 4 / 3);
            position: relative;
            background: #111;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            /* 'contain' memastikan tidak ada bagian yang terpotong/dicrop */
            object-fit: contain; 
            background: #000;
        }

        .controls {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #snap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #fff;
            background: radial-gradient(circle, #ff4444 0%, #cc0000 100%);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #snap:active { transform: scale(0.9); }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap" type="button"></button>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');

    async function init() {
        // Mengunci resolusi agar sensor membuka jangkauan terluas 3:4
        const constraints = {
            video: {
                facingMode: "user",
                // Resolusi tinggi agar jernih dan tidak pecah
                width: { ideal: 1200 },
                height: { ideal: 1600 },
                aspectRatio: 0.75
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (e) {
            alert("izin kamera bermasalah, sayang: " + e);
        }
    }

    document.getElementById('snap').onclick = function() {
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        // Mengambil resolusi asli dari sensor yang terbuka
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = `ORICamera_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    };

    window.onload = init;
</script>
</body>
</html>
