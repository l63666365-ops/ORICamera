<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
        }

        #camera-wrapper {
            width: 100vw;
            height: calc(100vw * 4 / 3);
            max-height: 75vh;
            position: relative;
            background: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: fill; 
        }

        .controls {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            z-index: 999;
        }

        /* Tombol jepret yang diperkuat area sentuhnya */
        #snap {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 8px solid #fff;
            background: #ff4444;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            display: block;
        }

        #snap:active {
            background: #b30000;
            transform: scale(0.9);
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <div id="snap"></div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });
            video.srcObject = stream;
        } catch (e) {
            console.log("kamera error: " + e);
        }
    }

    // Fungsi ambil foto menggunakan Event Listener yang lebih kuat
    function takePhoto() {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imgData = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = imgData;
        link.download = `ORICamera_${Date.now()}.png`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Mendukung sentuhan (touch) dan klik mouse
    snap.addEventListener('touchstart', function(e) {
        e.preventDefault();
        takePhoto();
    }, {passive: false});

    snap.addEventListener('click', function(e) {
        takePhoto();
    });

    window.onload = init;
</script>
</body>
</html>
