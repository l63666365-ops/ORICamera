<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
        }
        #camera-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            height: 120px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        #snap {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: #ff4444;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #snap:active { transform: scale(0.9); }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap"></button>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');

    // fungsi nyalain kamera
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });
            video.srcObject = stream;
        } catch (e) {
            alert("izin kamera ditolak atau tidak dukung: " + e);
        }
    }

    // fungsi ambil foto
    snap.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // download otomatis fotonya
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataURL;
        link.download = 'ORICamera_' + Date.now() + '.png';
        link.click();
    });

    init();
</script>

</body>
</html>
