<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
        }

        /* Container Kamera 3:4 yang sesungguhnya */
        #camera-wrapper {
            width: 100vw;
            height: calc(100vw * 4 / 3); /* Paksa tinggi sesuai rasio lebar */
            max-height: 80vh; 
            position: relative;
            background: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            /* Menghilangkan 'cover' agar tidak dicrop */
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
        }

        .controls {
            flex: 1;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #snap {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: radial-gradient(circle, #ff4444 0%, #990000 100%);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap"></button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');

    async function init() {
        const constraints = {
            video: {
                facingMode: "user",
                // Kita minta resolusi tinggi dengan aspek rasio 3:4 asli
                width: { ideal: 1440 }, 
                height: { ideal: 1920 },
                aspectRatio: 0.75
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (e) {
            alert("error sensor: " + e);
        }
    }

    document.getElementById('snap').addEventListener('click', () => {
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        const link = document.createElement('a');
        link.download = `ORICamera_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });

    init();
</script>
</body>
</html>
