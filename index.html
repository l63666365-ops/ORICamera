<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORICamera</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="1000208511.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif;
            align-items: center;
        }

        /* Container 3:4 Tegak yang pasti pas di HP */
        #camera-wrapper {
            width: 100vw;
            height: calc(100vw * 4 / 3); 
            background: #111;
            position: relative;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            /* Menggunakan cover agar layar penuh tapi tetap dalam rasio 3:4 */
            object-fit: cover; 
        }

        .controls {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #snap {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: #ff4444;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
        }
    </style>
</head>
<body>

<div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
    <button id="snap" type="button"></button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');

    async function init() {
        // Kuncinya ada di sini: Tinggi harus lebih besar dari Lebar untuk 3:4 tegak
        const constraints = {
            video: {
                facingMode: "user",
                width: { ideal: 720 },
                height: { ideal: 960 },
                aspectRatio: 0.75
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (e) {
            alert("kamera gagal: " + e);
        }
    }

    document.getElementById('snap').onclick = function() {
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        // Memastikan hasil jepretan sama persis dengan yang di layar
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = `ORICamera_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    };

    window.onload = init;
</script>
</body>
</html>
